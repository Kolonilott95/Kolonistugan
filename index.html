<style>
  :root {
    --accent: #378ADD;
    --accent-light: #E6F1FB;
    --accent-mid: #378ADD;
    --accent-dark: #0C447C;
    --accent-border: #B5D4F4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a1a1a; }

  header { background: var(--accent-dark); color: #fff; padding: 1.5rem 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 500; }
  header p { font-size: 0.95rem; opacity: 0.8; margin-top: 4px; }

  .about {
    background: var(--accent-light);
    border-bottom: 1px solid var(--accent-border);
    padding: 1rem 2rem;
    font-size: 0.9rem;
    color: var(--accent-dark);
  }

  .layout {
    display: flex;
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1rem;
    gap: 2rem;
    align-items: flex-start;
  }

  #sidebar { width: 180px; min-width: 180px; position: sticky; top: 1rem; }
  #sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 0.5rem; }
  .month-link {
    display: block; padding: 6px 10px; font-size: 0.9rem; color: #555;
    cursor: pointer; border-left: 2px solid transparent; border-radius: 0 4px 4px 0;
    text-decoration: none; transition: all 0.15s;
  }
  .month-link:hover { color: var(--accent); background: var(--accent-light); }
  .month-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-light); font-weight: 500; }

  #main { flex: 1; min-width: 0; }

  .month-section { margin-bottom: 2.5rem; }
  .month-heading {
    font-size: 0.78rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; color: #999; margin-bottom: 1rem;
    padding-bottom: 6px; border-bottom: 1px solid #e5e9f0;
  }

  .entry-card {
    background: #fff; border: 1px solid #e5e9f0; border-radius: 12px;
    padding: 1.1rem 1.3rem; margin-bottom: 1rem; transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #b5c8e0; }
  .entry-date { font-size: 0.78rem; color: #aaa; margin-bottom: 3px; }
  .entry-title { font-size: 1rem; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
  .entry-body { font-size: 0.9rem; color: #555; line-height: 1.7; white-space: pre-wrap; }
  .entry-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .entry-img { width: 100px; height: 78px; object-fit: cover; border-radius: 7px; border: 1px solid #e5e9f0; cursor: pointer; }

  #empty-state { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 1rem; }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; cursor: zoom-out;
  }
  .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

  @media (max-width: 640px) {
    .layout { flex-direction: column; }
    #sidebar { width: 100%; position: static; display: flex; gap: 8px; flex-wrap: wrap; }
    #sidebar h3 { display: none; }
    .month-link { border-left: none; border-bottom: 2px solid transparent; border-radius: 4px; }
    .month-link.active { border-bottom-color: var(--accent); }
  }

  .lb-inner { display:flex; flex-direction:column; align-items:center; cursor:default; }
  .lb-inner img { max-width:90vw; max-height:78vh; border-radius:8px; }
  .lb-controls { display:flex; align-items:center; gap:24px; margin-top:16px; }
  .lb-btn { background:rgba(255,255,255,0.2); color:#fff; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; }
  .lb-btn:hover { background:rgba(255,255,255,0.4); }
  .lb-empty { width:44px; height:44px; display:inline-block; }
  .lb-num { color:rgba(255,255,255,0.85); font-size:15px; min-width:50px; text-align:center; }
  .lb-x { position:fixed; top:18px; right:22px; background:rgba(255,255,255,0.2); color:#fff; border:none; border-radius:50%; width:38px; height:38px; font-size:18px; cursor:pointer; }
</style>

function groupByMonth(entries) {
  const months = {};
  entries.forEach(e => {
    const d = new Date(e.date);
    const key = d.toLocaleString('sv-SE', { year: 'numeric', month: 'long' });
    if (!months[key]) months[key] = [];
    months[key].push(e);
  });
  return months;
}

function render() {
  const container = document.getElementById('entries-container');
  const nav = document.getElementById('month-nav');

  if (!entries.length) {
    container.innerHTML = '<div id="empty-state">Inga arbetspass loggade ännu – kom tillbaka snart!</div>';
    nav.innerHTML = '';
    return;
  }

  const grouped = groupByMonth(entries);
  const keys = Object.keys(grouped);

  nav.innerHTML = keys.map((m, i) =>
    `<a class="month-link${i===0?' active':''}" onclick="scrollToMonth('${m}',this)" href="#">${m}</a>`
  ).join('');

  container.innerHTML = keys.map(month => {
    const cards = grouped[month].map(e => {
      const imgs = (e.images||[]).map((src,i) =>
        `<img class="entry-img" src="${src}" onclick="lightbox('${e.id}',${i})" alt="Byggbild">`
      ).join('');
      return `<article class="entry-card" id="e-${e.id}">
        <div class="entry-date">${new Date(e.date).toLocaleDateString('sv-SE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
        <div class="entry-title">${e.title}</div>
        ${e.body ? `<div class="entry-body">${e.body}</div>` : ''}
        ${imgs ? `<div class="entry-images">${imgs}</div>` : ''}
      </article>`;
    }).join('');
    return `<section class="month-section" data-month="${month}"><div class="month-heading">${month}</div>${cards}</section>`;
  }).join('');
}

function scrollToMonth(month, el) {
  event.preventDefault();
  document.querySelectorAll('.month-link').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const sec = document.querySelector(`.month-section[data-month="${month}"]`);
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

let _lbEntry = null, _lbIdx = 0;
function lightbox(id, idx) {
  _lbEntry = entries.find(x => x.id == id);
  if (!_lbEntry) return;
  _lbIdx = idx;
  showLightbox();
}
function showLightbox() {
  const ex = document.getElementById('lb-overlay');
  if (ex) ex.remove();
  const e = _lbEntry, total = e.images.length;
  const lb = document.createElement('div');
  lb.id = 'lb-overlay';
  lb.className = 'lightbox';
  lb.onclick = () => lb.remove();
  lb.innerHTML = '<div class="lb-inner" onclick="event.stopPropagation()">' +
    '<img src="' + e.images[_lbIdx] + '" alt="Bild">' +
    '<div class="lb-controls">' +
    (_lbIdx > 0 ? '<button class="lb-btn" onclick="lbPrev()">&#8592;</button>' : '<span class="lb-empty"></span>') +
    '<span class="lb-num">' + (_lbIdx+1) + ' / ' + total + '</span>' +
    (_lbIdx < total-1 ? '<button class="lb-btn" onclick="lbNext()">&#8594;</button>' : '<span class="lb-empty"></span>') +
    '</div></div>' +
    '<button class="lb-x" onclick="document.getElementById('lb-overlay').remove()">&#x2715;</button>';
  document.body.appendChild(lb);
}
function lbPrev() { _lbIdx--; showLightbox(); }
function lbNext() { _lbIdx++; showLightbox(); }

render();
</script>
